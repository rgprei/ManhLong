<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo VietQR Nhanh</title>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: #d32f2f;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
    }
    .form {
      padding: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #b71c1c;
    }
    .qr-area {
      padding: 20px;
      text-align: center;
      min-height: 340px;
      background: #fafafa;
    }
    .qr {
      width: 280px;
      max-width: 100%;
      height: auto;
      margin: 0 auto 15px;
      border: 8px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 16px;
      display: block;
    }
    .info {
      padding: 0 20px 25px;
      line-height: 1.8;
      font-size: 15px;
    }
    .loading {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">TẠO VIETQR CHUYỂN KHOẢN</div>
  
  <div class="form">
    <input type="number" id="amount" placeholder="Nhập số tiền" value="50000">
    <textarea id="content" rows="2" placeholder="Nội dung chuyển khoản"></textarea>
    <button onclick="generateQR()">TẠO QR CODE</button>
  </div>

  <div class="qr-area" id="qrArea">
    <p class="loading">Nhấn nút trên để tạo QR code...</p>
  </div>

  <div class="info">
    <strong>Thông tin nhận tiền (cố định):</strong><br>
    Chủ TK: NGUYEN THI HONG DUYEN<br>
    Số TK: 9987826985<br>
    Ngân hàng: Techcombank
  </div>
</div>

<script>
function generateQR() {
  const amount = document.getElementById('amount').value.trim();
  let content = document.getElementById('content').value.trim() || "Chuyen khoan";

  if (!amount || amount < 0) {
    alert("Vui lòng nhập số tiền hợp lệ!");
    return;
  }

  const encodedContent = encodeURIComponent(content);
  const accountName = encodeURIComponent("NGUYEN THI HONG DUYEN");

  const qrUrl = `https://img.vietqr.io/image/tcb-9987826985-compact2.png?amount=${amount}&addInfo=${encodedContent}&accountName=${accountName}`;

  const qrHTML = `
    <img src="${qrUrl}" alt="VietQR Code" class="qr" onerror="this.src='https://via.placeholder.com/280?text=Loi+Tai+Anh';">
    <p><strong>Số tiền:</strong> ${Number(amount).toLocaleString('vi-VN')} VND</p>
    <p><strong>Nội dung:</strong> ${content}</p>
    <small style="color:#666;">Quét bằng app ngân hàng bất kỳ</small>
  `;

  document.getElementById('qrArea').innerHTML = qrHTML;
}

window.onload = generateQR;
</script>

</body>
</html>
